name: Publish
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # necesario para que GitHub emita el token OIDC
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Test
        run: dotnet test -c Release --no-build

      - name: Pack
        run: dotnet pack Resolute/Resolute.csproj -c Release --no-build --output ./nupkgs

      - name: List generated packages
        run: ls -lah ./nupkgs

      # Obtiene una API key temporal (válida 1 hora) vía OIDC
      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: LlerenaL   # tu username de nuget.org (el perfil, no el email)

      - name: Push to NuGet.org
        shell: bash
        run: |
          dotnet nuget push "./nupkgs/*.nupkg" \
            --source "https://api.nuget.org/v3/index.json" \
            --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" \
            --skip-duplicate
