name: publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Test
        run: dotnet test -c Release --no-build

      - name: Pack
        run: dotnet pack Resolute/Resolute.csproj -c Release --no-build --output ./nupkgs

      - name: Check NuGet API key secret
        run: |
          if [ -z "${{ secrets.NUGET_API_KEY }}" ]; then
            echo "ERROR: NUGET_API_KEY secret is empty or not set." >&2
            exit 1
          else
            echo "NUGET_API_KEY secret is present."
          fi

      - name: Push to NuGet.org
        run: dotnet nuget push ./nupkgs/*.nupkg --source https://api.nuget.org/v3/index.json --api-key ${{ secrets.NUGET_API_KEY }} --verbosity detailed
